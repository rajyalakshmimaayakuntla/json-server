<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .cont{
    width:100px;
    height: 600px;
    background-color: rgb(233, 231, 231);
    border:2px solid black;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border-radius: 10px;
}
.card{
    width: 100%;
    height: 100px;
    background-color: aqua;
    display: flex;
    transition: 3s;
    border-radius: 10px;

}
</style>

<body>
    <div class="cont">
        <div class="card"></div>
    </div>
    <button onclick="changefloor(0,0)">Ground Floor</button>
    <button onclick="changefloor(-100,1)">1st Floor</button>
    <button onclick="changefloor(-200,2)">2nd Floor</button>
    <button onclick="changefloor(-300,3)">3rd Floor</button>
    <button onclick="changefloor(-400,4)">4th Floor</button>
    <button onclick="changefloor(-500,5)">5th Floor</button>

</body>
<script>
  function changefloor(p,f){
    document.querySelector(".card").style.transform="translateY("+p+"px)"
    document.querySelector(".card").ontransitionend=function(){
    if(f==0){
        var text="Ground Floor"
    }
    else if(f==1){
        var text="First Floor"
    }
    else if(f==2){
        var text="Second Floor"
    }
    else if(f==3){
        var text="Third Floor"
    }
    else{
        var text=f+"th Floor"
    }

    var speech=new SpeechSynthesisUtterance(text);
    window.speechSynthesis.speak(speech)}
}
</script>
</html>
