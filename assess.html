<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table id="tb" border="2">
        <thead id="thea">
            <tr>
                <th id="nam">Name</th>
                <th id="cooktime">Cooking Time</th>
                <th id="calaries">Calaries</th>
                <th id="rating">Rating</th>
            </tr>
        </thead>
        <tbody id="tbod"></tbody>
    </table>
    <button id="p"onclick="pr()">Previous</button>
    <button id="n">Next</button>
</body>
<script>
    var s=10
    recipesdata=[]
    function gentable(s)
    {
        document.getElementById("tbod").innerHTML=" "
    fetch("http://dummyjson.com/recipes?limit=10&skip="+s)
    .then(response=>response.json())
    .then(data=>{(recipesdata=data.recipes)
        displaytable();
    });
   }     
        function displaytable(){
            for(var i=0;i<recipesdata.length;i++)
            {
            var tro=document.createElement("tr")
            var td1=document.createElement("td")
            td1.innerText=data.recipes[i].name;
            var td2=document.createElement("td")
            td2.innerText=data.recipes[i].cookTimeMinutes;
            var td3=document.createElement("td")
            td3.innerText=data.recipes[i].caloriesPerServing;
            var td4=document.createElement("td")
            td4.innerText=data.recipes[i].rating;
            tro.appendChild(td1);
            tro.appendChild(td2);
            tro.appendChild(td3);
            tro.appendChild(td4);
            document.getElementById("tbod").appendChild(tro)
            }
            }
            document.getElementById("nam").onclick=function(){
            data.recipes.sort((a,b)=>a.name.localeCompare(b.name))
            displaytable()
            }
    gentable(s);
    document.getElementById("n").onclick=function()
    { 
        document.getElementById("p").disabled=false
        if(s>=30){
          document.getElementById("n").disabled=true  
        }
        else{
        s+=10;
        gentable(s); }
    
    }

    function pr(){
        document.getElementById("n").disabled=false
        if(s<=0){
            document.getElementById("p").disabled=true
        }
        else{
        s-=10;
        gentable(s);}
    }
    
  
</script>
</html>
