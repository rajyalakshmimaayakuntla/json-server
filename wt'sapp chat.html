<body>
    <div id="cont"></div>
    <input type="text" id="msg" placeholder="Enter your Mesaage Here">
    <select id="slct">
        <option value="sender">Sender</option>
        <option value="reciever">Reciever</option>
    </select>
    <button onclick="snd()" id="s">➤</button>
</body>
<script type="text/babel">
    var jsx=[]
    
     function snd(){
           if(document.getElementById("msg").value==""){
              return ;
           }
           else{
               jsx.push({
                    msg:document.getElementById("msg").value,
                    user:document.getElementById("slct").value
                    })
               genUI()
           }
        }
            function genUI(){
                var jsx1=[]
                for(var i=0;i<jsx.length;i++){
                     jsx1.push(<p className= {jsx[i].user=="sender"?"sender":"reciever"}>{jsx[i].msg}</p>)              
                }
                ReactDOM.render(jsx1,document.getElementById("cont"))
            }
            genUI();
   
</script>
</html>
