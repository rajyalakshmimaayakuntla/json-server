<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .cont{
        display: flex;
        flex-wrap: wrap;
        display: grid;
        justify-content: center;
        grid-template-columns: repeat(3,1fr);
        gap: 5px;
    }
    .card{
        display: flex;
        flex-direction: column;
        background-color: aquamarine;
        width: 350px;
        padding: 10px;
        border-radius:10px ;
    }
    .card img{
        width: 100%;
        height: 100%px;
        object-fit: cover;
        border-radius: 10px;
    }
</style>
<body>
    <div class="cont"></div>
    <button  onclick="prev()">Previous</button>
    <button  onclick="nxt()">Next</button>
</body>
<script>
    var s=10;
    function gencards(s){
    var c= document.querySelector(".cont");
    c.innerHTML=" "
    fetch("https://dummyjson.com/recipes?limit=10&skip="+s)
    .then(response=>response.json())
    .then(data=>{console.log(data.recipes)
        for(var i=0;i<data.recipes.length;i++){
        c.innerHTML+=` <div class="card">
                       <h1><u>Recipe Name :</u>${data.recipes[i].name}</h1>
                       <h2><u>Calories :</u>${data.recipes[i].caloriesPerServing}</h2>
                       <img src="${data.recipes[i].image}">
                       </div>`
        }
    })
}
gencards(s)
function nxt(){
    s+=10;
    gencards(s);
}
function prev(){
    s-=10;
    gencards(s);
}
</script>
</html>
