<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
    display: flex;
    justify-content: center;
    background-color: rgb(235, 247, 251);
    }
   .cont{
    width:300px;
    height: 450px;
    background-color: rgb(202, 236, 247);
    border: 2px solid rgb(158, 158, 247);
    border-radius: 20px;
   }
   .result{
    width:90%;
    height: 20%;
    background-color: rgb(239, 238, 238);
    margin-top: 20px;
    margin-left: 10px;
    margin-right: 10px;
    border-radius: 20px;
    border:2px solid rgb(130, 130, 130);
    text-align: right;
    padding-right: 10px;
   }
   .btns{
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    height: 300px;
    margin-left: 10px;
    margin-right: 10px;
   }
   .btns,button{
    border-radius: 10px;
    font-size: 25px;
    color: rgb(82, 82, 82);
   }
</style>
<body>
    <div class="cont">
        <div class="result">
            <h1 id="result"></h1>
        </div>
        <div class="btns">
            <button onclick="dis('1',this)" id="1">1</button>
            <button onclick="dis('2',this)" id="2">2</button>
            <button onclick="dis('3',this)" id="3">3</button>
            <button onclick="calculate(this)" id="=">=</button>
            <button onclick="dis('4',this)" id="4">4</button>
            <button onclick="dis('5',this)" id="5">5</button>
            <button onclick="dis('6',this)" id="6">6</button>
            <button onclick="dis('+',this)" id="+">+</button>
            <button onclick="dis('7',this)" id="7">7</button>
            <button onclick="dis('8',this)" id="8">8</button>
            <button onclick="dis('9',this)" id="9">9</button>
            <button onclick="dis('-',this)" id="-">-</button>
            <button onclick="dis('0',this)" id="0">0</button>
            <button onclick="dis('*',this)" id="*">*</button>
            <button onclick="dis('%',this)" id="%">%</button>
            <button onclick="cleardata(this)" id="c">C</button>
        </div>
    </div>
</body>
    <script>
        var data=""
        var prevbtn=null
        function dis(d,i){
            data+=d
            document.getElementById("result").innerText=data
            if(prevbtn){
                prevbtn.style.backgroundColor=""
            }
            i.style.backgroundColor="lightgrey"
            prevbtn=i;
        }
        function calculate(i){
            var x=document.getElementById("result").innerText;
            console.log(eval(x))
            document.getElementById("result").innerText=eval(x)
            if(prevbtn){
                prevbtn.style.backgroundColor=""
            }
            i.style.backgroundColor="lightgrey"
            prevbtn=i;
        }
        function cleardata(i){
            data=""
            document.getElementById("result").innerText=""
            if(prevbtn){
                prevbtn.style.backgroundColor=""
            }
            i.style.backgroundColor="lightgrey"
            prevbtn=i;
        }
    </script>
</html>
